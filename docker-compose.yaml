services:
  resreview-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resreview-server
    restart: unless-stopped
    env_file: .env.prod
    environment:
      APP_ENV: production
    ports:
      - "8100:8100"
    volumes:
      - /var/log/resreview-server:/var/log/resreview-server
    networks:
      - infra_net

networks:
  infra_net:
    external: true